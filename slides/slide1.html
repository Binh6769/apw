<!DOCTYPE html>
<html>
<head>
<style>
html { background: #0F172A; }
body {
  width: 720pt; height: 405pt; margin: 0; padding: 0;
  background: #0F172A; font-family: Arial, sans-serif;
  display: flex; flex-direction: column; overflow: hidden;
}
.top-bar { background: #E11D48; height: 6pt; width: 100%; }
.main {
  flex: 1; display: flex; flex-direction: column;
  justify-content: center; align-items: center; padding: 40pt;
}
.tag {
  background: #E11D48; color: #FFF;
  font-size: 11pt; font-weight: bold;
  padding: 6pt 18pt; border-radius: 20pt;
  letter-spacing: 2pt; text-transform: uppercase;
  margin-bottom: 16pt;
}
h1 {
  color: #F8FAFC; font-size: 44pt; font-weight: bold;
  margin: 0; text-align: center; line-height: 1.15;
}
h1 span { color: #FB7185; }
.sub {
  color: #94A3B8; font-size: 16pt; margin-top: 16pt;
  text-align: center; letter-spacing: 1pt;
}
.bottom-bar { background: #E11D48; height: 4pt; width: 100%; }
</style>
</head>
<body>
<div class="top-bar"></div>
<div class="main">
  <div class="tag"><p>Introduction</p></div>
  <h1>Anime: A World of<br><span>Animation</span></h1>
  <p class="sub">Art, Storytelling &amp; Global Culture</p>
</div>
<div class="bottom-bar"></div>
</body>
</html>
